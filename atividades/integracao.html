<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integração</title>

    <style>

        body{
            background: linear-gradient(135deg, #141e30, #243b55);
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            width: 500px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            color: #243b55;
            font-size: 32px;
            margin-bottom: 20px;
        }

        label{
            display: block;
            margin-top: 12px;
            color: #243b55;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 2px solid #dbeafe;
            border-radius: 10px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        input:focus, select:focus{
            border-color: #3b82f6;
            outline: none;
            background-color: #ffffff;
        }

        .radio-grupo{
            margin-top: 10px;
            color: #243b55;
        }

        button{
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover{
            transform: scale(1.03);
            background: linear-gradient(to right, #2563eb, #1d4ed8);
        }

        #resultado{
            margin-top: 20px;
            padding: 15px;
            background-color: #eff6ff;
            border-left: 5px solid #3b82f6;
            border-radius: 10px;
            color: #1e293b;
        }

        .erro {
            color: #dc2626;
            font-weight: bold;
        }

        .sucesso {
            color: #16a34a;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <div class="container">
        <h2>Atendimento</h2>

        <form id="formulario">

            <label> Nome:</label>
            <input type="text" id="Nome">

            <label> Idade:</label>
            <input type="number" id="Idade">

            <label> Tipo de Atendimento:</label>
            <select id="tipo">
                <option value="">Selecione</option>
                <option value="Tecnico">Técnico</option>
                <option value="Administrativo">Administrativo</option>
                <option value="Suporte">Suporte</option>

            </select>

            <label>Prioridade:</label>
            <div class="radio-grupo">
                <input type="radio" name="Prioridade" value="baixa"> Baixa
                <input type="radio" name="Prioridade" value="media"> Média
                <input type="radio" name="Prioridade" value="alta"> Alta

            </div>

            <button type="submit">Enviar</button>
        </form>

        <div id="resultado"></div>
    </div>

    <script>
        document.getElementById("formulario").addEventListener("submit", function(event){
            event.preventDefault();

            let nome = document.getElementById("Nome").value;
            let idade = document.getElementById("Idade").value;
            let tipo = document.getElementById("tipo").value;

            let prioridadeSelecionada = document.querySelector('input[name="prioridade"]:checked');
            let prioridade = prioridadeSelecionada ? prioridadeSelecionada.value : "";

            let  resultado = document.getElementById("resultado");

            if(nome === "") {
                resultado.innerHTML = "<p class = 'erro'> O nome é obrigatório!</p>"
                return;
            }

            if(idade === "" || idade <  0) {
                 resultado.innerHTML = "<p class = 'erro'> A idade está inválida!</p>"
                return;
            }

            let mensagem =  ""
            if(prioridade === "Alta") {
                mensagem += "Atendimento Urgente! <br>"
            }

            if(tipo === "Tecnico") {
                 mensagem += "Encaminhar para a equipe técnica! <br>"
            }

            if(idade < 18) {
                 mensagem += "Necessário responsável! <br>"
            }

            resultado.innerHTML = `
                <p class= "sucesso"><strong> Resumo do atendimento:</strong></p>
                Nome: ${nome}<br>
                Idade: ${idade}<br>
                Tipo: ${tipo}<br>
                Prioridade: ${prioridade}<br>
                ${mensagem}

            `;

        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>

    <style>

        body{
            background: linear-gradient(to right, #ffe6f7, #f3d9ff);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1{
            color: #6a0572;
            font-size: 40px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        table{
            margin: 20px auto;
            border-collapse: collapse;
            width: 85%;
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        th{
            background-color: #6a0572;
            color: white;
            padding: 15px;
            font-size: 18px;
        }

        td{
            padding: 15px;
            background-color: #fff7fc;
            transition: 0.3s;
        }

        tr:hover td{
            background-color: #ffe0f5;
        }

        img{
            border-radius: 10px;
            border: 3px solid #d46ac2;
            transition: 0.3s;
        }

        img:hover{
            transform: scale(1.08);
        }

        a{
            text-decoration: none;
            color: #6a0572;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover{
            color: #ff1493;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>
